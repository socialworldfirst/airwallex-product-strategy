<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Airwallex · Product Moves &amp; Strategy</title>
<style>
  :root{
    --ink:#16181d; --ink2:#3c4250; --ink3:#6b7280; --line:#e7e9ee;
    --bg:#ffffff; --bg2:#fafbfc; --accent:#2f6df6;
    --c1:#1f9d57; --c2:#c98a12; --c3:#8a8f9a; --c4:#b4452f;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.62;font-size:15px;-webkit-font-smoothing:antialiased}
  .wrap{display:grid;grid-template-columns:264px 1fr;max-width:1200px;margin:0 auto}

  aside{position:sticky;top:0;height:100vh;overflow-y:auto;padding:30px 20px 40px;border-right:1px solid var(--line)}
  .langtog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:22px}
  .langtog button{font-family:inherit;font-size:12.5px;font-weight:550;padding:6px 16px;background:#fff;border:0;color:var(--ink3);cursor:pointer;transition:.15s}
  .langtog button.on{background:var(--ink);color:#fff}
  aside .kick{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
  aside h1{font-size:16.5px;font-weight:650;letter-spacing:-.01em;line-height:1.32;margin-bottom:4px}
  aside .meta{font-size:12px;color:var(--ink3);margin-bottom:20px;line-height:1.55}
  .navpart{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:650;margin:18px 0 5px;padding-left:10px}
  .navpart:first-of-type{margin-top:0}
  nav a{display:block;font-size:12.5px;color:var(--ink2);text-decoration:none;padding:5px 10px;border-radius:7px;margin-bottom:1px;transition:.15s;border-left:2px solid transparent;cursor:pointer}
  nav a .n{color:var(--ink3);font-variant-numeric:tabular-nums;margin-right:7px;font-size:11.5px}
  nav a:hover{background:var(--bg2);color:var(--ink)}
  nav a.active{background:var(--bg2);color:var(--ink);border-left-color:var(--accent);font-weight:550}

  main{padding:52px 60px 120px;max-width:880px}
  section{margin-bottom:54px;scroll-margin-top:28px}
  .partbar{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:650;margin:0 0 30px;padding-bottom:12px;border-bottom:2px solid var(--ink)}
  .secnum{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums;letter-spacing:.08em;margin-bottom:9px}
  h2{font-size:24px;font-weight:660;letter-spacing:-.02em;line-height:1.22;margin-bottom:16px}
  h3{font-size:14px;font-weight:660;margin:26px 0 4px;letter-spacing:.01em;color:var(--ink);text-transform:uppercase;font-size:11.5px;letter-spacing:.08em;color:var(--ink3)}
  p{color:var(--ink2);margin-bottom:13px}
  strong{color:var(--ink);font-weight:600}
  .hr{height:1px;background:var(--line);border:0;margin:0 0 46px}
  a.src{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent}
  a.src:hover{border-bottom-color:var(--accent)}

  .lead h2{font-size:30px;line-height:1.16;margin-bottom:18px}
  .thesis{font-size:16px;color:var(--ink2);line-height:1.7}
  .thesis b{color:var(--ink)}
  .callout{border-left:2px solid var(--accent);padding:3px 0 3px 16px;margin:20px 0;font-size:14.5px;color:var(--ink);font-weight:500}
  .how{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:24px}
  .how .b{border:1px solid var(--line);border-radius:10px;padding:14px 15px;background:var(--bg2)}
  .how .b .t{font-size:12.5px;font-weight:660;margin-bottom:4px}
  .how .b .d{font-size:12px;color:var(--ink3);line-height:1.5}

  /* spec catalogue */
  .spec{border-top:1px solid var(--line);padding:13px 0 12px}
  .spec:first-of-type{border-top:0}
  .spec .top{display:flex;gap:9px;align-items:baseline}
  .spec .nm{font-size:14.5px;font-weight:625;color:var(--ink)}
  .spec .dt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;padding-left:8px}
  .spec p{font-size:13.5px;margin:4px 0 0;color:var(--ink2)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px;vertical-align:middle;position:relative;top:-1px;flex:none}
  .d-live{background:var(--c1)} .d-wip{background:var(--c2)} .d-talk{background:var(--c3)} .d-watch{background:var(--c4)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--ink3);margin:0 0 24px}

  /* timeline */
  .tl{position:relative;margin-top:4px;padding-left:16px}
  .tl::before{content:"";position:absolute;left:3px;top:6px;bottom:6px;width:1px;background:var(--line)}
  .tl .row{position:relative;padding:0 0 15px 16px}
  .tl .row::before{content:"";position:absolute;left:-15px;top:5px;width:7px;height:7px;border-radius:50%;background:#fff;border:1.5px solid var(--accent)}
  .tl .row.big::before{background:var(--accent)}
  .tl .d{font-family:var(--mono);font-size:11.5px;color:var(--ink3);margin-bottom:1px}
  .tl .t{font-size:13.5px;color:var(--ink2)}
  .tl .t b{color:var(--ink)}

  figure{margin:22px 0 8px;border:1px solid var(--line);border-radius:12px;padding:24px 22px 18px;background:var(--bg2)}
  figure svg{display:block;width:100%;height:auto}
  figcaption{font-size:12px;color:var(--ink3);margin-top:14px;line-height:1.55;text-align:center}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0 4px}
  .card{border:1px solid var(--line);border-radius:11px;padding:17px 18px;background:var(--bg2)}
  .card .t{font-size:13.5px;font-weight:640;margin-bottom:6px;letter-spacing:-.01em}
  .card .d{font-size:13px;color:var(--ink3);line-height:1.58}
  .card .d b{color:var(--ink2)}

  .move{border-top:1px solid var(--line);padding:16px 0 4px}
  .move:first-of-type{border-top:0}
  .move .h{font-size:15px;font-weight:625;color:var(--ink);margin-bottom:5px}
  .move p{font-size:14px;margin-bottom:8px}
  .ev{font-size:12.5px;color:var(--ink3)}
  .ev b{color:var(--ink2);font-weight:600}

  .road{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:18px 0 6px}
  .h-col{border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .h-col .cap{padding:12px 15px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .h-col .cap .when{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-family:var(--mono)}
  .h-col .cap .lab{font-size:14px;font-weight:640;margin-top:2px}
  .h-col ul{list-style:none;padding:13px 15px}
  .h-col li{font-size:13px;color:var(--ink2);padding-left:14px;position:relative;margin-bottom:11px;line-height:1.5}
  .h-col li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%}
  .h-col li.shipped::before{background:var(--c1)}
  .h-col li.likely::before{background:var(--c2)}
  .h-col li.bet::before{background:var(--c3)}
  .h-col li .conf{font-size:10.5px;color:var(--ink3);font-family:var(--mono);display:block;margin-top:1px}

  .vuln{border-top:1px solid var(--line);padding:14px 0}
  .vuln:first-of-type{border-top:0}
  .vuln .h{font-size:14.5px;font-weight:625;color:var(--ink);margin-bottom:3px}
  .vuln p{font-size:13.5px;margin-bottom:0}

  .wf{border:1px solid var(--line);border-radius:12px;padding:22px 24px;background:var(--bg2)}
  .wf .row{padding:13px 0;border-top:1px solid var(--line)}
  .wf .row:first-child{border-top:0;padding-top:2px}
  .wf .row .h{font-size:14.5px;font-weight:640;color:var(--ink);margin-bottom:3px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .wf .row .tag{font-size:10.5px;font-family:var(--mono);color:var(--ink3);border:1px solid var(--line);border-radius:20px;padding:1px 8px;white-space:nowrap}
  .wf .row p{font-size:13.5px;margin-bottom:0;color:var(--ink2)}

  ul.plain{list-style:none;margin:6px 0 8px}
  ul.plain li{position:relative;padding-left:17px;margin-bottom:9px;font-size:14px;color:var(--ink2)}
  ul.plain li::before{content:"";position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--ink3)}
  ul.plain li b{color:var(--ink)}
  .rlegend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--ink3);margin-top:8px}

  .foot{font-size:12px;color:var(--ink3);border-top:1px solid var(--line);padding-top:20px;margin-top:8px;line-height:1.7}

  @media (max-width:880px){
    .wrap{grid-template-columns:1fr}
    aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}
    nav{display:none}
    main{padding:32px 22px 80px}
    .grid2,.road,.how{grid-template-columns:1fr}
  }
</style>

<style>
body.locked{overflow:hidden}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999}
#gate-card{width:300px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
#gate-card h2{font-size:15px;font-weight:600;color:#16181d;margin-bottom:4px;letter-spacing:-.01em}
#gate-card .sub{font-size:12px;color:#6b7280;margin-bottom:18px}
#gate-form{display:flex;gap:8px}
#gate-input{flex:1;font-size:14px;padding:9px 12px;border:1px solid #e7e9ee;border-radius:8px;outline:none;font-family:inherit}
#gate-input:focus{border-color:#16181d}
#gate-btn{font-size:14px;padding:9px 16px;border:0;border-radius:8px;background:#16181d;color:#fff;cursor:pointer;font-family:inherit}
#gate-err{font-size:12px;color:#b4452f;margin-top:10px;min-height:14px}
</style>
</head>

<div id="gate"><div id="gate-card">
  <h2>Airwallex 竞品档案</h2>

  <form id="gate-form" onsubmit="return gateSubmit(event)">
    <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,it){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const k=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},k,b64ToBytes(b.ciphertext));return new TextDecoder().decode(p);}
function runScripts(c){c.querySelectorAll('script').forEach(o=>{const s=document.createElement('script');if(o.src)s.src=o.src;else s.textContent=o.textContent;document.body.appendChild(s);});}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');runScripts(c);}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('awx_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('awx_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('awx_pw');}catch(_){}}})();
</script>
